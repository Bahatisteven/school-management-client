version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: client-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: school_management
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - client-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: client-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/school_management?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_EXPIRY: ${TOKEN_EXPIRY:-24h}
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - client-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: client-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - client-network
    environment:
      VITE_API_URL: http://localhost:5000/api

networks:
  client-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
